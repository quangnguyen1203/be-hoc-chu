html_content = """<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Vui Học Chữ Và Số</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #F7FFF7;
            --text: #2F3E46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            padding-bottom: 30px;
        }

        header {
            background-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 0px #fff, 2px 2px 0px rgba(0,0,0,0.1);
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-mode {
            background-color: var(--secondary);
            color: white;
        }

        .btn-mode.active {
            background-color: var(--primary);
            animation: pulse 1s infinite alternate;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 130px));
            gap: 15px;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: transform 0.2s;
            border: 3px solid transparent;
        }

        .card:active {
            transform: scale(0.95);
        }

        .card-letter {
            font-size: 3.5rem;
            font-weight: 900;
            display: block;
            margin-bottom: 5px;
        }

        .card-emoji {
            font-size: 2.5rem;
            display: block;
        }

        .game-box {
            background: white;
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-top: 10px;
        }

        .question-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .target-sound-btn {
            background-color: var(--accent);
            border: none;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            font-size: 3rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #DEB900;
            margin-bottom: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            animation: bounce 2s infinite;
        }

        .target-sound-btn:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        .btn-option {
            background: #F0F2F5;
            border: 3px solid #E4E6EB;
            padding: 25px 10px;
            font-size: 2.5rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            background-color: #f00;
            position: absolute;
            z-index: 1000;
            border-radius: 50%;
            animation: fly 1s ease-out forwards;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        .c1 { color: #FF6B6B; border-color: #FFD2D2; }
        .c2 { color: #4ECDC4; border-color: #D1F5F2; }
        .c3 { color: #1A535C; border-color: #E2E8F0; }
        .c4 { color: #FF9F43; border-color: #FFEAA7; }
        .c5 { color: #10AC84; border-color: #A2E8DD; }
        .c6 { color: #5F27CD; border-color: #E0D4F7; }
    </style>
</head>
<body>

    <header>
        <h1>🎈 BÉ VUI HỌC CHỮ 🎈</h1>
        <div class="nav-buttons">
            <button class="btn btn-mode active" id="btn-learn" onclick="switchView('learn')">📖 HỌC CHỮ</button>
            <button class="btn btn-mode" id="btn-game" onclick="switchView('game')">🎮 TRÒ CHƠI</button>
        </div>
    </header>

    <div class="container">
        <section id="section-learn" class="view-section active">
            <div style="text-align: center; margin-bottom: 20px;">
                <button class="btn" style="background:#ff9f43; color:white;" onclick="loadData('abc')">🔤 Chữ Cái</button>
                <button class="btn" style="background:#10ac84; color:white;" onclick="loadData('123')">🔢 Chữ Số</button>
            </div>
            <div class="grid-container" id="learn-grid"></div>
        </section>

        <section id="section-game" class="view-section">
            <div class="game-box">
                <div class="question-title">Bé hãy tìm chữ này nhé:</div>
                <button class="target-sound-btn" onclick="playTargetSound()">🔊</button>
                <div class="options-grid" id="options-container"></div>
            </div>
        </section>
    </div>

    <script>
        const abcData = [
            { l: 'A', e: '🐟', s: 'Chữ A - Con cá' },
            { l: 'Ă', e: '🦛', s: 'Chữ Ă - Con Hà mã' },
            { l: 'Â', e: '🐻', s: 'Chữ Â - Con gấu' },
            { l: 'B', e: '🐮', s: 'Chữ B - Con bò' },
            { l: 'C', e: '🐶', s: 'Chữ C - Con chó' },
            { l: 'D', e: '🐐', s: 'Chữ D - Con dê' },
            { l: 'Đ', e: '🦚', s: 'Chữ Đ - Con chim công' },
            { l: 'E', e: '🐸', s: 'Chữ E - Con ếch' },
            { l: 'Ê', e: '🦤', s: 'Chữ Ê - Con chim' },
            { l: 'G', e: '🐓', s: 'Chữ G - Con gà' },
            { l: 'H', e: '🐯', s: 'Chữ H - Con hổ' },
            { l: 'I', e: '🐜', s: 'Chữ I - Con kiến' },
            { l: 'K', e: '🦁', s: 'Chữ K - Con sư tử' },
            { l: 'L', e: '🐷', s: 'Chữ L - Con lợn' },
            { l: 'M', e: '🐈', s: 'Chữ M - Con mèo' },
            { l: 'N', e: '🦔', s: 'Chữ N - Con nhím' },
            { l: 'O', e: '🐓', s: 'Chữ O - Quả trứng óng' },
            { l: 'Ô', e: '☂️', s: 'Cái ô' },
            { l: 'Ơ', e: '🛟', s: 'Cái phao' },
            { l: 'P', e: '🐘', s: 'Chữ P - Con voi' },
            { l: 'Q', e: '🍌', s: 'Quả chuối' },
            { l: 'R', e: '🐢', s: 'Con rùa' },
            { l: 'S', e: '🦁', s: 'Sư tử' },
            { l: 'T', e: '🐇', s: 'Con thỏ' },
            { l: 'U', e: '🐌', s: 'Con ốc sên' },
            { l: 'Ư', e: '🦌', s: 'Con hươu' },
            { l: 'V', e: '🦆', s: 'Con vịt' },
            { l: 'X', e: '🚗', s: 'Xe ô tô' },
            { l: 'Y', e: '🩺', s: 'Y tế' }
        ];

        const numData = [
            { l: '0', e: '🥚', s: 'Số Không' },
            { l: '1', e: '☝️', s: 'Số Một' },
            { l: '2', e: '✌️', s: 'Số Hai' },
            { l: '3', e: '🤟', s: 'Số Ba' },
            { l: '4', e: '🍀', s: 'Số Bốn' },
            { l: '5', e: '🖐️', s: 'Số Năm' },
            { l: '6', e: '🍎', s: 'Số Sáu' },
            { l: '7', e: '⭐', s: 'Số Bảy' },
            { l: '8', e: '🎈', s: 'Số Tám' },
            { l: '9', e: '🐱', s: 'Số Chín' },
            { l: '10', e: '🔟', s: 'Số Mười' }
        ];

        let currentDataType = 'abc';
        let currentTarget = null;

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            
            if(view === 'learn') {
                document.getElementById('section-learn').classList.add('active');
                document.getElementById('btn-learn').classList.add('active');
            } else {
                document.getElementById('section-game').classList.add('active');
                document.getElementById('btn-game').classList.add('active');
                initGame();
            }
        }

        function loadData(type) {
            currentDataType = type;
            const data = type === 'abc' ? abcData : numData;
            const grid = document.getElementById('learn-grid');
            grid.innerHTML = '';

            data.forEach((item, index) => {
                const colorClass = `c${(index % 6) + 1}`;
                const card = document.createElement('div');
                card.className = `card ${colorClass}`;
                card.onclick = () => {
                    speak(item.s);
                    createCelebration(card);
                };
                card.innerHTML = `
                    <span class="card-letter">${item.l}</span>
                    <span class="card-emoji">${item.e}</span>
                `;
                grid.appendChild(card);
            });
        }

        function initGame() {
            const data = currentDataType === 'abc' ? abcData : numData;
            const correctIndex = Math.floor(Math.random() * data.length);
            currentTarget = data[correctIndex];

            let options = [currentTarget];
            while(options.length < 4) {
                const randomItem = data[Math.floor(Math.random() * data.length)];
                if(!options.includes(randomItem)) {
                    options.push(randomItem);
                }
            }
            options.sort(() => Math.random() - 0.5);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            options.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                const colors = ['#FF6B6B', '#4ECDC4', '#FF9F43', '#10AC84'];
                btn.style.color = colors[index % 4];
                btn.innerText = item.l;
                btn.onclick = (e) => checkAnswer(item.l, e.target);
                container.appendChild(btn);
            });

            setTimeout(() => { playTargetSound(); }, 400);
        }

        function playTargetSound() {
            if(currentTarget) {
                speak(`Bé hãy tìm chữ: ${currentTarget.l}`);
            }
        }

        function checkAnswer(selectedLetter, element) {
            if(selectedLetter === currentTarget.l) {
                speak("Đúng rồi! Bé giỏi quá!");
                createCelebration(element);
                element.style.backgroundColor = '#2ecc71';
                element.style.color = 'white';
                setTimeout(() => { initGame(); }, 2000);
            } else {
                speak("Chưa đúng rồi, bé thử lại xem");
                element.style.backgroundColor = '#e74c3c';
                element.style.color = 'white';
                setTimeout(() => {
                    element.style.backgroundColor = '#F0F2F5';
                    element.style.color = '#2F3E46';
                }, 800);
            }
        }

        function createCelebration(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2 + window.scrollY;
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#10AC84', '#9b59b6', '#3498db'];

            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = centerX + 'px';
                confetti.style.top = centerY + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * 100;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;

                confetti.style.setProperty('--x', `${x}px`);
                confetti.style.setProperty('--y', `${y}px`);

                document.body.appendChild(confetti);
                setTimeout(() => { confetti.remove(); }, 1000);
            }
        }

        window.onload = () => {
            loadData('abc');
        };
    </script>
</body>
</html>"""

with open("index.html", "w", encoding="utf-8") as f:
    f.write(html_content)
print("File index.html created successfully.")
