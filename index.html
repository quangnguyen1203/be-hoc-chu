<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu App Cho Bé Học Chữ, Số VÀ Loài Vật</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #F7FFF7;
            --text: #2F3E46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        header {
            background-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 12px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            color: var(--primary);
            font-size: 1.6rem;
            margin-bottom: 8px;
            text-shadow: 1px 1px 0px #fff, 2px 2px 0px rgba(0,0,0,0.1);
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-mode {
            background-color: var(--secondary);
            color: white;
        }

        .btn-mode.active {
            background-color: var(--primary);
            animation: pulse 1s infinite alternate;
        }

        .container {
            max-width: 800px;
            margin: 15px auto;
            padding: 0 12px;
        }

        /* THANH CHỌN CHỦ ĐỀ CUỘN NGANG ĐẸP MẮT */
        .topic-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 5px 15px 5px;
            margin-bottom: 15px;
            scrollbar-width: none; /* Ẩn scrollbar trên firefox */
        }
        .topic-bar::-webkit-scrollbar {
            display: none; /* Ẩn scrollbar trên safari/chrome */
        }

        .btn-topic {
            background: white;
            color: #4a4a4a;
            border: 3px solid #E4E6EB;
            padding: 10px 18px;
            font-size: 1.1rem;
            border-radius: 20px;
            white-space: nowrap;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #E4E6EB;
        }
        .btn-topic.active {
            background: var(--accent);
            border-color: #FFA801;
            box-shadow: 0 4px 0 #FFA801;
            transform: scale(1.05);
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* LƯỚI HIỂN THỊ HỌC TẬP */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 110px));
            gap: 12px;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 15px 5px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: transform 0.2s;
            border: 3px solid transparent;
        }

        .card:active {
            transform: scale(0.95);
        }

        .card-main {
            font-size: 3rem;
            font-weight: 900;
            display: block;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .card-sub {
            font-size: 1.8rem;
            display: block;
        }

        /* CHẾ ĐỘ TRÒ CHƠI */
        .game-box {
            background: white;
            border-radius: 30px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .visual-question-card {
            background: #FFFDF0;
            border: 4px dashed #FFE66D;
            border-radius: 25px;
            padding: 20px;
            margin: 15px auto 25px auto;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.04);
        }

        .vq-hint-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
        }

        .vq-main-display {
            font-size: 4.5rem;
            font-weight: 900;
            color: #FF6B6B;
            line-height: 1.2;
        }

        .vq-sub-display {
            font-size: 3.5rem;
            margin-top: 5px;
        }

        .vq-text-read {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2F3E46;
            margin-top: 8px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 440px;
            margin: 0 auto;
        }

        .btn-option {
            background: #F0F2F5;
            border: 3px solid #E4E6EB;
            padding: 15px 5px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #D1D3D4;
        }

        .btn-option:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .opt-main {
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 1.2;
        }

        .opt-sub {
            font-size: 2rem;
        }

        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            z-index: 1000;
            border-radius: 50%;
            animation: fly 1s ease-out forwards;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        .c1 { color: #FF6B6B; border-color: #FFD2D2; }
        .c2 { color: #4ECDC4; border-color: #D1F5F2; }
        .c3 { color: #FF9F43; border-color: #FFEAA7; }
        .c4 { color: #10AC84; border-color: #A2E8DD; }
        .c5 { color: #5F27CD; border-color: #E0D4F7; }
        .c6 { color: #0ABDE3; border-color: #C7ECEE; }
    </style>
</head>
<body>

    <header>
        <h1>🌟 BÉ THÔNG MINH BÁCH KHOA 🌟</h1>
        <div class="nav-buttons">
            <button class="btn btn-mode active" id="btn-learn" onclick="switchView('learn')">📖 XEM & HỌC</button>
            <button class="btn btn-mode" id="btn-game" onclick="switchView('game')">🎮 CHƠI ĐỐ VUI</button>
        </div>
    </header>

    <div class="container">
        <!-- THANH ĐIỀU HƯỚNG CHỦ ĐỀ CUỘN NGANG -->
        <div class="topic-bar">
            <button class="btn-topic active" id="tp-abc" onclick="selectTopic('abc')">🔤 Chữ Cái</button>
            <button class="btn-topic" id="tp-num" onclick="selectTopic('num')">🔢 Chữ Số</button>
            <button class="btn-topic" id="tp-color" onclick="selectTopic('color')">🎨 Màu Sắc</button>
            <button class="btn-topic" id="tp-shape" onclick="selectTopic('shape')">🔺 Hình Khối</button>
            <button class="btn-topic" id="tp-animal" onclick="selectTopic('animal')">🦁 Động Vật</button>
            <button class="btn-topic" id="tp-fruit" onclick="selectTopic('fruit')">🍎 Hoa Quả</button>
        </div>

        <!-- PHẦN 1: BẢNG HỌC TẬP TỪNG CHỦ ĐỀ -->
        <section id="section-learn" class="view-section active">
            <div class="grid-container" id="learn-grid"></div>
        </section>

        <!-- PHẦN 2: TRÒ CHƠI ĐỐ VUI THEO CHỦ ĐỀ ĐANG CHỌN -->
        <section id="section-game" class="view-section">
            <div class="game-box">
                <div style="font-size: 1.2rem; font-weight: bold; color: #555;">Bé ơi! Tìm hình giống khung vàng này nhé:</div>
                
                <div class="visual-question-card" onclick="playTargetSound()">
                    <div class="vq-hint-text">Cần tìm:</div>
                    <div class="vq-main-display" id="vq-main">A</div>
                    <div class="vq-sub-display" id="vq-sub">🐟</div>
                    <div class="vq-text-read" id="vq-text">Chữ A - Con cá</div>
                    <div style="font-size: 0.9rem; color: #888; margin-top: 8px;">🔊 Bấm để nghe lại giọng đọc</div>
                </div>
                
                <div class="options-grid" id="options-container"></div>
            </div>
        </section>
    </div>

    <script>
        // KHO DỮ LIỆU ĐA DẠNG CHO BÉ
        const appDatabase = {
            abc: [
                { m: 'A', s: '🐟', t: 'Chữ A - Con cá' },
                { m: 'Ă', s: '🦛', t: 'Chữ Ă - Hà mã' },
                { m: 'Â', s: '🐻', t: 'Chữ Â - Con gấu' },
                { m: 'B', s: '🐮', t: 'Chữ B - Con bò' },
                { m: 'C', s: '🐶', t: 'Chữ C - Con chó' },
                { m: 'D', s: '🐐', t: 'Chữ D - Con dê' },
                { m: 'Đ', s: '🦚', t: 'Chữ Đ - Chim công' },
                { m: 'E', s: '🐸', t: 'Chữ E - Con ếch' },
                { m: 'Ê', s: '🦤', t: 'Chữ Ê - Con chim' },
                { m: 'G', s: '🐓', s: '🐓', t: 'Chữ G - Con gà' },
                { m: 'H', s: '🐯', t: 'Chữ H - Con hổ' },
                { m: 'I', s: '🐜', t: 'Chữ I - Con kiến' },
                { m: 'K', s: '🦁', t: 'Chữ K - Sư tử' },
                { m: 'L', s: '🐷', t: 'Chữ L - Con lợn' },
                { m: 'M', s: '🐈', t: 'Chữ M - Con mèo' },
                { m: 'N', s: '🦔', t: 'Chữ N - Con nhím' },
                { m: 'O', s: '🥚', t: 'Chữ O - Quả trứng' },
                { m: 'Ô', s: '☂️', t: 'Chữ Ô - Cái ô' },
                { m: 'Ơ', s: '🛟', t: 'Chữ Ơ - Cái phao' },
                { m: 'P', s: '🐘', t: 'Chữ P - Con voi' },
                { m: 'Q', s: '🍌', t: 'Chữ Q - Quả chuối' },
                { m: 'R', s: '🐢', t: 'Chữ R - Con rùa' },
                { m: 'S', s: '🦁', t: 'Chữ S - Sư tử' },
                { m: 'T', s: '🐇', t: 'Chữ T - Con thỏ' },
                { m: 'U', s: '🐌', t: 'Chữ U - Ốc sên' },
                { m: 'Ư', s: 'Deer', s: ' deer ', s: '🦌', t: 'Chữ Ư - Con hươu' },
                { m: 'V', s: '🦆', t: 'Chữ V - Con vịt' },
                { m: 'X', s: '🚗', t: 'Chữ X - Xe ô tô' },
                { m: 'Y', s: '🩺', t: 'Chữ Y - Y tế' }
            ],
            num: [
                { m: '0', s: '🥚', t: 'Số Không' },
                { m: '1', s: '☝️', t: 'Số Một' },
                { m: '2', s: '✌️', t: 'Số Hai' },
                { m: '3', s: '🤟', t: 'Số Ba' },
                { m: '4', s: '🍀', t: 'Số Bốn' },
                { m: '5', s: '🖐️', t: 'Số Năm' },
                { m: '6', s: '🍎', t: 'Số Sáu' },
                { m: '7', s: '⭐', t: 'Số Bảy' },
                { m: '8', s: '🎈', t: 'Số Tám' },
                { m: '9', s: '🐱', t: 'Số Chín' },
                { m: '10', s: '🔟', t: 'Số Mười' }
            ],
            color: [
                { m: '🔴', s: 'Đỏ', t: 'Màu Đỏ' },
                { m: '🟡', s: 'Vàng', t: 'Màu Vàng' },
                { m: '🔵', s: 'Xanh', t: 'Màu Xanh Dương' },
                { m: '🟢', s: 'Lá', t: 'Màu Xanh Lá Cây' },
                { m: '🟠', s: 'Cam', t: 'Màu Cam' },
                { m: '🟣', s: 'Tím', t: 'Màu Tím' },
                { m: '⚫', s: 'Đen', t: 'Màu Đen' },
                { m: '⚪', s: 'Trắng', t: 'Màu Trắng' },
                { m: '🟤', s: 'Nâu', t: 'Màu Nâu' },
                { m: '💗', s: 'Hồng', t: 'Màu Hồng' }
            ],
            shape: [
                { m: '🔴', s: 'Tròn', t: 'Hình Tròn' },
                { m: '🟧', s: 'Vuông', t: 'Hình Vuông' },
                { m: '🔺', s: 'Tam Giác', t: 'Hình Tam Giác' },
                { m: '⭐', s: 'Sao', t: 'Hình Ngôi Sao' },
                { m: '❤️', s: 'Tim', t: 'Hình Trái Tim' },
                { m: '🔷', s: 'Thoi', t: 'Hình Thoi' },
                { m: '🌙', s: 'Trăng', t: 'Hình Trăng Khuyết' }
            ],
            animal: [
                { m: '🦁', s: 'Sư Tử', t: 'Con Sư Tử' },
                { m: '🐯', s: 'Hổ', t: 'Con Hổ' },
                { m: '🐘', s: 'Voi', t: 'Con Voi' },
                { m: '🐒', s: 'Khỉ', t: 'Con Khỉ' },
                { m: '🦒', s: 'Hươu Cao Cổ', t: 'Con Hươu Cao Cổ' },
                { m: '🐕', s: 'Chó', t: 'Con Chó' },
                { m: '🐈', s: 'Mèo', t: 'Con Mèo' },
                { m: '🐖', s: 'Lợn', t: 'Con Lợn' },
                { m: '🐇', s: 'Thỏ', t: 'Con Thỏ' },
                { m: '🦆', s: 'Vịt', t: 'Con Vịt' },
                { m: '🐓', s: 'Gà', t: 'Con Gà' },
                { m: '🐬', s: 'Cá Heo', t: 'Con Cá Heo' }
            ],
            fruit: [
                { m: '🍎', s: 'Táo', t: 'Quả Táo' },
                { m: '🍌', s: 'Chuối', t: 'Quả Chuối' },
                { m: '🍉', s: 'Dưa Hấu', t: 'Quả Dưa Hấu' },
                { m: '🍇', s: 'Nho', t: 'Quả Nho' },
                { m: '🍊', s: 'Cam', t: 'Quả Cam' },
                { m: '🍓', s: 'Dâu Tây', t: 'Quả Dâu Tây' },
                { m: '🥭', s: 'Xoài', t: 'Quả Xoài' },
                { m: '🍍', s: 'Dứa', t: 'Quả Dứa' },
                { m: '🥑', s: 'Bơ', t: 'Quả Bơ' },
                { m: '🌽', s: 'Ngô', t: 'Bắp Ngô' }
            ]
        };

        let currentTopic = 'abc';
        let currentMode = 'learn';
        let currentTarget = null;

        // Giọng đọc tiếng Việt chuẩn, đọc chậm rãi cho bé 3 tuổi
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.75; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // Thay đổi chế độ chính (Xem Học / Chơi game)
        function switchView(mode) {
            currentMode = mode;
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            
            if(mode === 'learn') {
                document.getElementById('section-learn').classList.add('active');
                document.getElementById('btn-learn').classList.add('active');
                renderLearnMode();
            } else {
                document.getElementById('section-game').classList.add('active');
                document.getElementById('btn-game').classList.add('active');
                initGameMode();
            }
        }

        // Chọn chủ đề học tập
        function selectTopic(topicKey) {
            currentTopic = topicKey;
            document.querySelectorAll('.btn-topic').forEach(b => b.classList.remove('active'));
            document.getElementById(`tp-${topicKey}`).classList.add('active');
            
            if(currentMode === 'learn') {
                renderLearnMode();
            } else {
                initGameMode();
            }
        }

        // Vẽ danh sách thẻ học của chủ đề được chọn
        function renderLearnMode() {
            const data = appDatabase[currentTopic];
            const grid = document.getElementById('learn-grid');
            grid.innerHTML = '';

            data.forEach((item, index) => {
                const colorClass = `c${(index % 6) + 1}`;
                const card = document.createElement('div');
                card.className = `card ${colorClass}`;
                card.onclick = () => {
                    speak(item.t);
                    createCelebration(card);
                };
                card.innerHTML = `
                    <span class="card-main">${item.m}</span>
                    <span class="card-sub">${item.s}</span>
                `;
                grid.appendChild(card);
            });
        }

        // TRÒ CHƠI: Tạo câu hỏi theo đúng chủ đề đang chọn
        function initGameMode() {
            const data = appDatabase[currentTopic];
            
            // Chọn ngẫu nhiên một mục làm đáp án đúng
            const correctIndex = Math.floor(Math.random() * data.length);
            currentTarget = data[correctIndex];

            // Hiển thị gợi ý siêu rõ ràng lên khung vàng
            document.getElementById('vq-main').innerText = currentTarget.m;
            document.getElementById('vq-sub').innerText = currentTarget.s;
            document.getElementById('vq-text').innerText = currentTarget.t;

            // Xử lý tạo 4 lựa chọn (Nếu bộ dữ liệu ít hơn 4 mục thì lấy tối đa có thể)
            let maxOptions = Math.min(4, data.length);
            let options = [currentTarget];
            
            while(options.length < maxOptions) {
                const randomItem = data[Math.floor(Math.random() * data.length)];
                if(!options.includes(randomItem)) {
                    options.push(randomItem);
                }
            }
            options.sort(() => Math.random() - 0.5);

            // Đổ các nút đáp án ra màn hình
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            options.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                const colors = ['#FF6B6B', '#4ECDC4', '#FF9F43', '#10AC84'];
                btn.style.color = colors[index % 4];
                btn.style.borderColor = colors[index % 4];
                
                btn.innerHTML = `
                    <span class="opt-main">${item.m}</span>
                    <span class="opt-sub">${item.s}</span>
                `;
                btn.onclick = () => checkAnswer(item.m, btn);
                container.appendChild(btn);
            });

            setTimeout(() => { playTargetSound(); }, 400);
        }

        // Phát âm câu hỏi
        function playTargetSound() {
            if(currentTarget) {
                speak(`Bé hãy tìm: ${currentTarget.t}`);
            }
        }

        // Kiểm tra đúng hay sai
        function checkAnswer(selectedMain, element) {
            if(selectedMain === currentTarget.m) {
                speak("Đúng rồi! Bé giỏi quá!");
                createCelebration(element);
                
                element.style.backgroundColor = '#2ecc71';
                element.style.color = 'white';
                element.style.boxShadow = 'none';
                
                // Qua câu đố tiếp theo sau 2.5 giây
                setTimeout(() => { initGameMode(); }, 2500);
            } else {
                speak("Chưa đúng rồi, bé chọn lại xem nào");
                element.style.backgroundColor = '#e74c3c';
                element.style.color = 'white';
                element.style.boxShadow = 'none';
                
                // Trả nút về trạng thái cũ sau 1 giây cho bé thử lại
                setTimeout(() => {
                    element.style.backgroundColor = '#F0F2F5';
                    element.style.color = element.style.borderColor;
                    element.style.boxShadow = '0 6px 0 #D1D3D4';
                }, 1000);
            }
        }

        // Hiệu ứng pháo hoa rực rỡ khi bé bấm trúng
        function createCelebration(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2 + window.scrollY;
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#10AC84', '#9b59b6', '#3498db'];

            for (let i = 0; i < 22; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = centerX + 'px';
                confetti.style.top = centerY + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * 110;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;

                confetti.style.setProperty('--x', `${x}px`);
                confetti.style.setProperty('--y', `${y}px`);

                document.body.appendChild(confetti);
                setTimeout(() => { confetti.remove(); }, 1000);
            }
        }

        // Mặc định tải trang chạy chủ đề Chữ cái đầu tiên
        window.onload = () => {
            renderLearnMode();
        };
    </script>
</body>
</html>
