<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Vui Học Số - Trò Chơi Trí Tuệ</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #F7FFF7;
            --text: #2F3E46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            padding-bottom: 30px;
        }

        header {
            background-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 0px #fff, 2px 2px 0px rgba(0,0,0,0.1);
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            border: none;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-mode {
            background-color: var(--secondary);
            color: white;
        }

        .btn-mode.active {
            background-color: var(--primary);
            animation: pulse 1s infinite alternate;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* CHẾ ĐỘ HỌC SỐ */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: transform 0.2s;
            border: 3px solid transparent;
        }

        .card:active {
            transform: scale(0.95);
        }

        .card-number {
            font-size: 4rem;
            font-weight: 900;
            display: block;
        }

        /* Khung hiển thị số phóng to khi bấm vào */
        .focus-box {
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            display: none;
            animation: zoomIn 0.3s ease-out;
        }

        .focus-number {
            font-size: 8rem;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
        }

        .focus-text {
            font-size: 2rem;
            font-weight: bold;
            color: #2F3E46;
            margin-top: 10px;
        }

        /* CHẾ ĐỘ TRÒ CHƠI ĐỐ VUI */
        .game-box {
            background: white;
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .question-title {
            font-size: 1.6rem;
            margin-bottom: 25px;
            font-weight: bold;
            color: #2F3E46;
            line-height: 1.4;
        }

        .question-title span {
            color: #FF6B6B;
            font-size: 2rem;
            font-weight: 900;
            background: #FFE66D;
            padding: 2px 15px;
            border-radius: 10px;
            display: inline-block;
            margin: 0 5px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        .btn-option {
            background: #F0F2F5;
            border: 3px solid #E4E6EB;
            padding: 20px 10px;
            font-size: 3.5rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #D1D3D4;
        }

        .btn-option:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        /* Hiệu ứng hạt pháo hoa sinh động */
        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            background-color: #f00;
            position: absolute;
            z-index: 1000;
            border-radius: 50%;
            animation: fly 1s ease-out forwards;
        }

        /* Định nghĩa hiệu ứng chuyển động */
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        @keyframes zoomIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        /* Màu sắc rực rỡ bắt mắt bé */
        .c1 { color: #FF6B6B; border-color: #FFD2D2; }
        .c2 { color: #4ECDC4; border-color: #D1F5F2; }
        .c3 { color: #FF9F43; border-color: #FFEAA7; }
        .c4 { color: #10AC84; border-color: #A2E8DD; }
        .c5 { color: #5F27CD; border-color: #E0D4F7; }
        .c6 { color: #0ABDE3; border-color: #C7ECEE; }
    </style>
</head>
<body>

    <header>
        <h1>🔢 BÉ VUI HỌC SỐ 🎈</h1>
        <div class="nav-buttons">
            <button class="btn btn-mode active" id="btn-learn" onclick="switchView('learn')">📖 BẤM XEM SỐ</button>
            <button class="btn btn-mode" id="btn-game" onclick="switchView('game')">🎮 TRÒ CHƠI ĐỐ VUI</button>
        </div>
    </header>

    <div class="container">
        <!-- CHẾ ĐỘ 1: XEM SỐ VÀ PHÁT ÂM -->
        <section id="section-learn" class="view-section active">
            <!-- Ô hiển thị phóng to số khi được chọn -->
            <div class="focus-box" id="focus-box" onclick="replayFocusSound()">
                <div class="focus-number" id="focus-num">0</div>
                <div class="focus-text" id="focus-txt">Số Không</div>
                <div style="font-size:1rem; color:#aaa; margin-top:5px;">🔊 Bấm để nghe lại</div>
            </div>

            <!-- Bảng chọn số từ 0 - 10 -->
            <div class="grid-container" id="numbers-grid">
                <!-- Javascript tự đổ các số vào đây -->
            </div>
        </section>

        <!-- CHẾ ĐỘ 2: TRÒ CHƠI CÂU ĐỐ CHỌN SỐ -->
        <section id="section-game" class="view-section">
            <div class="game-box">
                <div class="question-title" id="question-text">
                    Bé hãy tìm xem <br><strong>số nào trong các số sau đây</strong> là <br><span id="target-number-display">?</span>
                </div>
                
                <div class="options-grid" id="options-container">
                    <!-- Các lựa chọn đáp án tự động hiện ở đây -->
                </div>
            </div>
        </section>
    </div>

    <script>
        // Danh sách dữ liệu các số
        const numData = [
            { num: '0', text: 'Số Không' },
            { num: '1', text: 'Số Một' },
            { num: '2', text: 'Số Hai' },
            { num: '3', text: 'Số Ba' },
            { num: '4', text: 'Số Bốn' },
            { num: '5', text: 'Số Năm' },
            { num: '6', text: 'Số Sáu' },
            { num: '7', text: 'Số Bảy' },
            { num: '8', text: 'Số Tám' },
            { num: '9', text: 'Số Chín' },
            { num: '10', text: 'Số Mười' }
        ];

        let currentTarget = null;
        let lastSelectedNumber = null;

        // Hàm phát giọng nói tiếng Việt
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.8; // Đọc chậm rãi, rõ ràng cho bé dễ bắt chước
                window.speechSynthesis.speak(utterance);
            }
        }

        // Chuyển qua lại giữa chế độ Học và Chơi
        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            
            if(view === 'learn') {
                document.getElementById('section-learn').classList.add('active');
                document.getElementById('btn-learn').classList.add('active');
            } else {
                document.getElementById('section-game').classList.add('active');
                document.getElementById('btn-game').classList.add('active');
                initGame();
            }
        }

        // Tạo bảng số ở chế độ học
        function initLearnMode() {
            const grid = document.getElementById('numbers-grid');
            grid.innerHTML = '';

            numData.forEach((item, index) => {
                const colorClass = `c${(index % 6) + 1}`;
                const card = document.createElement('div');
                card.className = `card ${colorClass}`;
                card.onclick = () => selectNumber(item, card);
                card.innerHTML = `<span class="card-number">${item.num}</span>`;
                grid.appendChild(card);
            });
        }

        // Khi bé chọn vào 1 số cụ thể ở chế độ Học
        function selectNumber(item, element) {
            lastSelectedNumber = item;
            
            // Hiện khung tiêu điểm phóng to lên
            const focusBox = document.getElementById('focus-box');
            const focusNum = document.getElementById('focus-num');
            const focusTxt = document.getElementById('focus-txt');
            
            focusNum.innerText = item.num;
            focusTxt.innerText = item.text;
            focusBox.style.display = 'block';
            
            // Đọc âm thanh số lên
            speak(item.text);
            
            // Tạo pháo hoa bung nở vui mắt
            createCelebration(element);
        }

        // Bấm nghe lại số đang phóng to
        function replayFocusSound() {
            if(lastSelectedNumber) {
                speak(lastSelectedNumber.text);
            }
        }

        // TRÒ CHƠI: Tạo câu đố tìm số ngẫu nhiên
        function initGame() {
            // Lấy ngẫu nhiên 1 số để làm đáp án đúng
            const correctIndex = Math.floor(Math.random() * numData.length);
            currentTarget = numData[correctIndex];

            // Hiển thị số cần tìm dạng chữ lên câu hỏi
            document.getElementById('target-number-display').innerText = currentTarget.text;

            // Tạo danh sách 4 lựa chọn (1 đúng, 3 sai)
            let options = [currentTarget];
            while(options.length < 4) {
                const randomItem = numData[Math.floor(Math.random() * numData.length)];
                if(!options.includes(randomItem)) {
                    options.push(randomItem);
                }
            }
            // Trộn ngẫu nhiên vị trí các nút bấm đáp án
            options.sort(() => Math.random() - 0.5);

            // Đổ các nút bấm ra màn hình cho bé lựa chọn
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            options.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                const colors = ['#FF6B6B', '#4ECDC4', '#FF9F43', '#10AC84'];
                btn.style.color = colors[index % 4];
                btn.innerText = item.num;
                btn.onclick = (e) => checkAnswer(item.num, e.target);
                container.appendChild(btn);
            });

            // Tự động đọc câu hỏi khi bắt đầu lượt chơi mới
            setTimeout(() => {
                speak(`${currentTarget.text} là số nào trong các số sau đây hả bé?`);
            }, 300);
        }

        // Kiểm tra xem bé bấm đúng hay sai đáp án
        function checkAnswer(selectedNum, element) {
            if(selectedNum === currentTarget.num) {
                speak("Đúng rồi! Bé giỏi quá, hoan hô!");
                createCelebration(element);
                
                element.style.backgroundColor = '#2ecc71';
                element.style.color = 'white';
                element.style.boxShadow = 'none';
                
                // Tự động chuyển câu hỏi tiếp theo sau 2.5 giây
                setTimeout(() => { initGame(); }, 2500);
            } else {
                speak("Chưa đúng rồi! Bé thử tìm lại xem nào.");
                element.style.backgroundColor = '#e74c3c';
                element.style.color = 'white';
                element.style.boxShadow = 'none';
                
                // Trả lại nút bấm bình thường sau 1 giây để bé chọn lại
                setTimeout(() => {
                    element.style.backgroundColor = '#F0F2F5';
                    element.style.color = element.style.borderColor;
                    element.style.boxShadow = '0 6px 0 #D1D3D4';
                }, 1000);
            }
        }

        // Tạo hiệu ứng bong bóng pháo hoa rực rỡ khi nhấn
        function createCelebration(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2 + window.scrollY;
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#10AC84', '#9b59b6', '#3498db'];

            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = centerX + 'px';
                confetti.style.top = centerY + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 60 + Math.random() * 120;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;

                confetti.style.setProperty('--x', `${x}px`);
                confetti.style.setProperty('--y', `${y}px`);

                document.body.appendChild(confetti);
                setTimeout(() => { confetti.remove(); }, 1000);
            }
        }

        // Khởi chạy khi tải trang
        window.onload = () => {
            initLearnMode();
        };
    </script>
</body>
</html>
