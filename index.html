<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Vui Học Chữ Và Số</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #F7FFF7;
            --text: #2F3E46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            padding-bottom: 30px;
        }

        header {
            background-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 0px #fff, 2px 2px 0px rgba(0,0,0,0.1);
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-mode {
            background-color: var(--secondary);
            color: white;
        }

        .btn-mode.active {
            background-color: var(--primary);
            animation: pulse 1s infinite alternate;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* CHẾ ĐỘ HỌC */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 110px));
            gap: 12px;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 15px 5px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: transform 0.2s;
            border: 3px solid transparent;
        }

        .card:active {
            transform: scale(0.95);
        }

        .card-letter {
            font-size: 3rem;
            font-weight: 900;
            display: block;
            margin-bottom: 5px;
        }

        .card-emoji {
            font-size: 2rem;
            display: block;
        }

        /* CHẾ ĐỘ TRÒ CHƠI */
        .game-box {
            background: white;
            border-radius: 30px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-top: 10px;
        }

        /* Khung hiển thị Gợi ý Câu hỏi to rõ cho bé 3 tuổi */
        .visual-question-card {
            background: #FFFDF0;
            border: 4px dashed #FFE66D;
            border-radius: 25px;
            padding: 20px;
            margin: 15px auto 25px auto;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.04);
        }

        .vq-hint-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
        }

        .vq-main-display {
            font-size: 5rem;
            font-weight: 900;
            color: #FF6B6B;
            line-height: 1;
        }

        .vq-sub-display {
            font-size: 3.5rem;
            margin-top: 10px;
        }

        .vq-text-read {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2F3E46;
            margin-top: 5px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 440px;
            margin: 0 auto;
        }

        .btn-option {
            background: #F0F2F5;
            border: 3px solid #E4E6EB;
            padding: 15px 5px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #D1D3D4;
        }

        .btn-option:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .opt-letter {
            font-size: 3rem;
            font-weight: 900;
        }

        .opt-emoji {
            font-size: 2rem;
        }

        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            background-color: #f00;
            position: absolute;
            z-index: 1000;
            border-radius: 50%;
            animation: fly 1s ease-out forwards;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        .c1 { color: #FF6B6B; border-color: #FFD2D2; }
        .c2 { color: #4ECDC4; border-color: #D1F5F2; }
        .c3 { color: #FF9F43; border-color: #FFEAA7; }
        .c4 { color: #10AC84; border-color: #A2E8DD; }
        .c5 { color: #5F27CD; border-color: #E0D4F7; }
        .c6 { color: #0ABDE3; border-color: #C7ECEE; }
    </style>
</head>
<body>

    <header>
        <h1>🎈 BÉ VUI HỌC CHỮ VÀ SỐ 🎈</h1>
        <div class="nav-buttons">
            <button class="btn btn-mode active" id="btn-learn" onclick="switchView('learn')">📖 XEM BẢNG CHỮ</button>
            <button class="btn btn-mode" id="btn-game" onclick="switchView('game')">🎮 TRÒ CHƠI ĐỐ VUI</button>
        </div>
    </header>

    <div class="container">
        <!-- PHẦN 1: BẢNG HỌC TẬP -->
        <section id="section-learn" class="view-section active">
            <div style="text-align: center; margin-bottom: 20px;">
                <button class="btn" style="background:#ff9f43; color:white;" onclick="loadData('abc')">🔤 Bảng Chữ Cái</button>
                <button class="btn" style="background:#10ac84; color:white;" onclick="loadData('123')">🔢 Bảng Chữ Số</button>
            </div>
            <div class="grid-container" id="learn-grid"></div>
        </section>

        <!-- PHẦN 2: TRÒ CHƠI ĐỐ VUI (CẢ CHỮ LẪN SỐ XEN KẼ) -->
        <section id="section-game" class="view-section">
            <div class="game-box">
                <div style="font-size: 1.3rem; font-weight: bold; color: #555;">Bé ơi! Tìm đáp án giống khung vàng nhé:</div>
                
                <!-- Khung gợi ý TRỰC QUAN: Đầy đủ Chữ, Hình, Chữ đọc và có Loa bấm phát âm -->
                <div class="visual-question-card" onclick="playTargetSound()">
                    <div class="vq-hint-text">Cần tìm:</div>
                    <div class="vq-main-display" id="vq-letter">A</div>
                    <div class="vq-sub-display" id="vq-emoji">🐟</div>
                    <div class="vq-text-read" id="vq-text">Chữ A (Con cá)</div>
                    <div style="font-size: 0.9rem; color: #888; margin-top: 10px;">🔊 Bấm nghe lại giọng đọc</div>
                </div>
                
                <!-- 4 Nút lựa chọn đáp án -->
                <div class="options-grid" id="options-container"></div>
            </div>
        </section>
    </div>

    <script>
        // Dữ liệu Chữ cái tiếng Việt + Hình minh họa trực quan
        const abcData = [
            { l: 'A', e: '🐟', s: 'Chữ A', full: 'Chữ A - Con cá' },
            { l: 'Ă', e: '🦛', s: 'Chữ Ă', full: 'Chữ Ă - Hà mã' },
            { l: 'Â', e: '🐻', s: 'Chữ Â', full: 'Chữ Â - Con gấu' },
            { l: 'B', e: '🐮', s: 'Chữ B', full: 'Chữ B - Con bò' },
            { l: 'C', e: '🐶', s: 'Chữ C', full: 'Chữ C - Con chó' },
            { l: 'D', e: '🐐', s: 'Chữ D', full: 'Chữ D - Con dê' },
            { l: 'Đ', e: '🦚', s: 'Chữ Đ', full: 'Chữ Đ - Chim công' },
            { l: 'E', e: '🐸', s: 'Chữ E', full: 'Chữ E - Con ếch' },
            { l: 'Ê', e: '🦤', s: 'Chữ Ê', full: 'Chữ Ê - Con chim' },
            { l: 'G', e: '🐓', s: 'Chữ G', full: 'Chữ G - Con gà' },
            { l: 'H', e: '🐯', s: 'Chữ H', full: 'Chữ H - Con hổ' },
            { l: 'I', e: '🐜', s: 'Chữ I', full: 'Chữ I - Con kiến' },
            { l: 'K', e: '🦁', s: 'Chữ K', full: 'Chữ K - Sư tử' },
            { l: 'L', e: '🐷', s: 'Chữ L', full: 'Chữ L - Con lợn' },
            { l: 'M', e: '🐈', s: 'Chữ M', full: 'Chữ M - Con mèo' },
            { l: 'N', e: '🦔', s: 'Chữ N', full: 'Chữ N - Con nhím' },
            { l: 'O', e: '🥚', s: 'Chữ O', full: 'Chữ O - Quả trứng' },
            { l: 'Ô', e: '☂️', s: 'Chữ Ô', full: 'Chữ Ô - Cái ô' },
            { l: 'Ơ', e: '🛟', s: 'Chữ Ơ', full: 'Chữ Ơ - Cái phao' },
            { l: 'P', e: '🐘', s: 'Chữ P', full: 'Chữ P - Con voi' },
            { l: 'Q', e: '🍌', s: 'Chữ Q', full: 'Chữ Q - Quả chuối' },
            { l: 'R', e: '🐢', s: 'Chữ R', full: 'Chữ R - Con rùa' },
            { l: 'S', e: '🦁', s: 'Chữ S', full: 'Chữ S - Sư tử' },
            { l: 'T', e: '🐇', s: 'Chữ T', full: 'Chữ T - Con thỏ' },
            { l: 'U', e: '🐌', s: 'Chữ U', full: 'Chữ U - Ốc sên' },
            { l: 'Ư', e: '🦌', s: 'Chữ Ư', full: 'Chữ Ư - Con hươu' },
            { l: 'V', e: '🦆', s: 'Chữ V', full: 'Chữ V - Con vịt' },
            { l: 'X', e: '🚗', s: 'Chữ X', full: 'Chữ X - Xe ô tô' },
            { l: 'Y', e: '🩺', s: 'Chữ Y', full: 'Chữ Y - Y tế' }
        ];

        // Dữ liệu Chữ số + Hình minh họa trực quan
        const numData = [
            { l: '0', e: '🥚', s: 'Số Không', full: 'Số Không' },
            { l: '1', e: '☝️', s: 'Số Một', full: 'Số Một' },
            { l: '2', e: '✌️', s: 'Số Hai', full: 'Số Hai' },
            { l: '3', e: '🤟', s: 'Số Ba', full: 'Số Ba' },
            { l: '4', e: '🍀', s: 'Số Bốn', full: 'Số Bốn' },
            { l: '5', e: '🖐️', s: 'Số Năm', full: 'Số Năm' },
            { l: '6', e: '🍎', s: 'Số Sáu', full: 'Số Sáu' },
            { l: '7', e: '⭐', s: 'Số Bảy', full: 'Số Bảy' },
            { l: '8', e: '🎈', s: 'Số Tám', full: 'Số Tám' },
            { l: '9', e: '🐱', s: 'Số Chín', full: 'Số Chín' },
            { l: '10', e: '🔟', s: 'Số Mười', full: 'Số Mười' }
        ];

        let currentDataType = 'abc';
        let currentTarget = null;

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.8; // Đọc chậm cho bé 3 tuổi nghe rõ
                window.speechSynthesis.speak(utterance);
            }
        }

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            
            if(view === 'learn') {
                document.getElementById('section-learn').classList.add('active');
                document.getElementById('btn-learn').classList.add('active');
            } else {
                document.getElementById('section-game').classList.add('active');
                document.getElementById('btn-game').classList.add('active');
                initGame();
            }
        }

        function loadData(type) {
            currentDataType = type;
            const data = type === 'abc' ? abcData : numData;
            const grid = document.getElementById('learn-grid');
            grid.innerHTML = '';

            data.forEach((item, index) => {
                const colorClass = `c${(index % 6) + 1}`;
                const card = document.createElement('div');
                card.className = `card ${colorClass}`;
                card.onclick = () => {
                    speak(item.full);
                    createCelebration(card);
                };
                card.innerHTML = `
                    <span class="card-letter">${item.l}</span>
                    <span class="card-emoji">${item.e}</span>
                `;
                grid.appendChild(card);
            });
        }

        // TRÒ CHƠI: Tự động trộn ngẫu nhiên cả Chữ và Số
        function initGame() {
            // Ngẫu nhiên chọn đố Chữ cái hoặc đố Chữ Số theo tỉ lệ 50/50
            const gamePool = Math.random() > 0.5 ? abcData : numData;
            
            const correctIndex = Math.floor(Math.random() * gamePool.length);
            currentTarget = gamePool[correctIndex];

            // Đổ dữ liệu gợi ý TRỰC QUAN lên khung vàng (Chữ, Hình, Mô tả)
            document.getElementById('vq-letter').innerText = currentTarget.l;
            document.getElementById('vq-emoji').innerText = currentTarget.e;
            document.getElementById('vq-text').innerText = currentTarget.full;

            // Tạo tập hợp 4 lựa chọn cho bé bấm
            let options = [currentTarget];
            while(options.length < 4) {
                const randomItem = gamePool[Math.floor(Math.random() * gamePool.length)];
                if(!options.includes(randomItem)) {
                    options.push(randomItem);
                }
            }
            options.sort(() => Math.random() - 0.5);

            // Vẽ các nút bấm lựa chọn đáp án
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            options.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                const colors = ['#FF6B6B', '#4ECDC4', '#FF9F43', '#10AC84'];
                btn.style.color = colors[index % 4];
                btn.style.borderColor = colors[index % 4];
                
                // Nút bấm có cả Chữ lẫn Hình minh họa tương ứng
                btn.innerHTML = `
                    <span class="opt-letter">${item.l}</span>
                    <span class="opt-emoji">${item.e}</span>
                `;
                btn.onclick = (e) => checkAnswer(item.l, btn);
                container.appendChild(btn);
            });

            // Tự động phát âm thanh hướng dẫn câu hỏi
            setTimeout(() => { playTargetSound(); }, 400);
        }

        function playTargetSound() {
            if(currentTarget) {
                speak(`Bé hãy tìm: ${currentTarget.full}`);
            }
        }

        function checkAnswer(selectedLetter, element) {
            if(selectedLetter === currentTarget.l) {
                speak("Đúng rồi! Bé giỏi quá!");
                createCelebration(element);
                
                element.style.backgroundColor = '#2ecc71';
                element.style.color = 'white';
                element.style.boxShadow = 'none';
                
                // Chuyển sang câu mới sau 2.5 giây
                setTimeout(() => { initGame(); }, 2500);
            } else {
                speak("Chưa đúng rồi, bé chọn lại xem nào");
                element.style.backgroundColor = '#e74c3c';
                element.style.color = 'white';
                element.style.boxShadow = 'none';
                
                setTimeout(() => {
                    element.style.backgroundColor = '#F0F2F5';
                    element.style.color = element.style.borderColor;
                    element.style.boxShadow = '0 6px 0 #D1D3D4';
                }, 1000);
            }
        }

        function createCelebration(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2 + window.scrollY;
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#10AC84', '#9b59b6', '#3498db'];

            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = centerX + 'px';
                confetti.style.top = centerY + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * 100;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;

                confetti.style.setProperty('--x', `${x}px`);
                confetti.style.setProperty('--y', `${y}px`);

                document.body.appendChild(confetti);
                setTimeout(() => { confetti.remove(); }, 1000);
            }
        }

        window.onload = () => {
            loadData('abc');
        };
    </script>
</body>
</html>
